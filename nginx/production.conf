server {
    listen 80;
    listen [::]:80;
    server_name ksionda.me www.ksionda.me;

    # Redirect www to non-www
    if ($host = www.ksionda.me) {
        return 301 https://ksionda.me$request_uri;
    }

    # Redirect HTTP to HTTPS (uncomment after certbot sets up SSL)
    # return 301 https://$host$request_uri;

    root /var/www/ksionda.me;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Serve .html files without the extension
    location ~ ^/([^.]+)$ {
        try_files $uri $uri.html $uri/ =404;
    }
}

